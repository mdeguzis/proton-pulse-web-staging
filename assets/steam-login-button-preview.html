<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Steam Login Button Preview</title>
<style>
  :root {
    --bg: #151a20;
    --steam-btn-bg-top: #21324a;
    --steam-btn-bg-bottom: #1a2637;
    --steam-btn-border: #304762;
    --steam-btn-shadow: rgba(0, 0, 0, 0.24);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    font: 15px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  .preview-card {
    padding: 32px;
    border: 1px solid #343e50;
    background: #1c2128;
  }

  .gh-login-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(180deg, var(--steam-btn-bg-top), var(--steam-btn-bg-bottom));
    border: 1px solid var(--steam-btn-border);
    border-radius: 16px;
    color: #f2f6fb;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.04),
      0 8px 18px var(--steam-btn-shadow);
    font-size: 0.9rem;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: -0.01em;
    line-height: 1;
    min-height: 34px;
    padding: 1px 13px 1px 6px;
    white-space: nowrap;
    width: fit-content;
  }

  .gh-login-btn__badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .gh-login-btn__icon {
    width: 24px;
    height: 24px;
    display: block;
  }

  .gh-login-btn__label {
    display: inline-flex;
    align-items: center;
    line-height: 1;
  }
</style>
</head>
<body>
  <div class="preview-card">
    <div class="gh-login-btn">
      <span class="gh-login-btn__badge" aria-hidden="true">
        <img class="gh-login-btn__icon" src="steam-logo-glyph.png" alt="">
      </span>
      <span class="gh-login-btn__label">Login with Steam</span>
    </div>
  </div>
</body>
</html>
