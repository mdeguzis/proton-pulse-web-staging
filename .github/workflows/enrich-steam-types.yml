name: Enrich Steam Types

# Standalone runner for scripts/pipeline/steam_type.py against gh-pages.
# Bypasses the full finalize pipeline (which has been hanging on unrelated
# enrichers, #258) so the DLC / Mod / Software / Demo filter always has
# fresh data even when finalize is having a rough day.
#
# Runs the type enricher directly against gh-pages/search-index.json,
# then commits the result back. Each run enriches at most PROBE_CAP
# (~200) new Steam apps, so the coverage grows a bit per run. Cache is
# persisted in gh-pages so subsequent runs skip already-typed apps.

on:
  schedule:
    # Every 6 hours -- Steam appdetails rate limit resets after ~5 min,
    # so we could go faster, but 6h keeps churn low and still fills the
    # long tail over a couple of days.
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      cycles:
        description: "How many enrichment cycles to run per dispatch (1 cycle ~= 200 apps, ~5 min rate-limit wait between)."
        required: false
        default: "1"

permissions:
  contents: write

concurrency:
  group: enrich-steam-types
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo (for the script)
        uses: actions/checkout@v7
        with:
          path: repo
          persist-credentials: false

      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Run enricher + commit per cycle
        working-directory: repo
        env:
          # Scheduled runs (no inputs) do 8 cycles (~1,600 apps, ~40 min) so the
          # search-index type backfill actually keeps pace instead of crawling
          # 1 cycle / 6h. Manual dispatch still honors its explicit cycles input.
          CYCLES: ${{ github.event.inputs.cycles || '8' }}
          GH_PAGES: ${{ github.workspace }}/gh-pages
        run: |
          # Loop N enrichment cycles inside one dispatch. Each cycle
          # enriches up to PROBE_CAP (~200) apps, commits the delta to
          # gh-pages IMMEDIATELY so a cancelled or timed-out run keeps
          # the work already done, then sleeps 300s so Steam's
          # ~200-req/5min soft-throttle resets before the next cycle.
          cd "$GH_PAGES"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd "$GITHUB_WORKSPACE/repo"
          for i in $(seq 1 "$CYCLES"); do
            echo "=== enrichment cycle $i of $CYCLES ==="
            python -c "
          from pathlib import Path
          from scripts.pipeline.steam_type import enrich_search_index_with_steam_type
          enrich_search_index_with_steam_type(Path('${GH_PAGES}'))
          "
            python -c "
          import json
          rows = json.load(open('${GH_PAGES}/search-index.json'))
          from collections import Counter
          c = Counter()
          for r in rows:
              t = r[11] if len(r) > 11 else None
              c[t] += 1
          print('total rows:', len(rows))
          for t, n in c.most_common():
              print(f'  {t!r}: {n}')
          "
            # Commit + push this cycle's delta before sleeping.
            (
              cd "$GH_PAGES"
              git add search-index.json steam-type-cache.json
              if git diff --cached --quiet; then
                echo "cycle $i: no change"
              else
                git commit -m "chore(enrich): cycle $i type-column refresh"
                for j in 1 2 3; do
                  if git pull --rebase origin gh-pages && git push origin gh-pages; then
                    break
                  fi
                  echo "push race on cycle $i attempt $j"
                  sleep 3
                done
              fi
            )
            if [ "$i" -lt "$CYCLES" ]; then
              echo "sleeping 300s so Steam rate-limit resets before next cycle..."
              sleep 300
            fi
          done

      - name: Final commit fallback
        working-directory: gh-pages
        run: |
          # Safety net in case the per-cycle commit failed silently.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add search-index.json steam-type-cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no straggler change, exiting clean"
            exit 0
          fi
          git commit -m "chore(enrich): final flush"
          # Rebase-then-push handles the edge-fn-health workflow racing us
          # on edge-status.json. A retry loop covers rare cases where
          # another push lands between our fetch and our push.
          for i in 1 2 3; do
            if git pull --rebase origin gh-pages && git push origin gh-pages; then
              exit 0
            fi
            echo "push race attempt $i, retrying"
            sleep 3
          done
          echo "push retries exhausted"
          exit 1
