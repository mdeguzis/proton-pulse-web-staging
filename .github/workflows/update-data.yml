name: Build Site Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      pages_only:
        description: "Republish GitHub Pages shell files plus static assets without running the data pipeline"
        required: false
        default: false
        type: boolean
      backfill_app_ids:
        description: "Comma-separated app IDs to backfill and publish. Accepts Steam numeric ids AND GOG/Epic canonical ids (e.g. 570,gog:1207658691,epic:MyGame). Steam ids reach ProtonDB backfill; non-Steam ids are logged as accepted-but-deferred until per-product refresh lands (#112). Skips the full pipeline. See #114."
        required: false
        default: ""
      coverage_backfill_issue_type:
        description: "Coverage issue type to backfill (no-titles, bad-app-id, no-protondb-data)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "no-titles"
          - "bad-app-id"
          - "no-protondb-data"
      coverage_backfill_limit:
        description: "Max matching apps to process for coverage-backfill. Use 0 for no limit."
        required: false
        default: "0"
      staging_only:
        description: "Deploy shell files to staging site only (no production deploy). Use to preview changes before pushing to prod."
        required: false
        default: false
        type: boolean
      staging_with_pipeline:
        description: "Run the FULL pipeline against the staging branch and deploy data + shell to the staging repo. Slow (30+ min). Use when a pipeline-data change needs end-to-end verification before promoting to prod (#117)."
        required: false
        default: false
        type: boolean
      staging_with_finalize:
        description: "Skip probe + build, restore prod chunk state from gh-pages, re-run only finalize + stats, push to the staging repo. Fast (~5 min) verification path for changes that only touch finalize.py or search-index shape (#196)."
        required: false
        default: false
        type: boolean
      resume:
        description: "Only re-run chunks marked incomplete in gh-pages/.pipeline-state/manifest.json. Rescue path for a partial run (e.g. chunk 8 stalled while 1-7 + 9-10 completed) -- avoids re-doing the successful work. #171 Phase 3."
        required: false
        default: false
        type: boolean
      finalize_only:
        description: "Skip probing entirely and re-run finalize against whatever chunk state is already in gh-pages/.pipeline-state/. Use when a finalize-side bug needs a fix but the probe cache is fine. #171 Phase 3."
        required: false
        default: false
        type: boolean
      # Standardized inputs (#218). `backfill_app_ids` is the domain-specific
      # name for this workflow's app-id list, so we don't rename it -- but
      # every workflow now accepts issue_id + dry_run for a common back-comment
      # + preview-only story.
      issue_id:
        description: "GitHub issue to comment run summary back on (leave blank to skip)"
        required: false
        default: ""
      dry_run:
        description: "Preview: run stages that read but skip commits + Supabase writes (best-effort per stage)"
        type: boolean
        default: false
      deploy_target:
        description: "Where to publish the built site. 'ghpages' (default) uses the existing gh-pages orphan deploy. 'cloudflare' syncs data/ to R2 and deploys the shell to Cloudflare Pages (#362). Pluggable + reversible."
        required: false
        default: "ghpages"
        type: choice
        options:
          - ghpages
          - cloudflare

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  PROTONDB_PROBE_LIMIT: "5000"
  PROTONDB_PROBE_BACKFILL_LIMIT: "0"
  PROTONDB_PROBE_LOG_EVERY: "100"

jobs:

  # ── Stage 1: process reports, backfill, compute probe plan ─────────
  build:
    # finalize_only skips build entirely -- we're re-running the finalize
    # stage against gh-pages state as-is, no need to re-shard/re-probe.
    if: inputs.pages_only != true && inputs.staging_only != true && inputs.backfill_app_ids == '' && inputs.coverage_backfill_issue_type == '' && inputs.finalize_only != true && inputs.staging_with_finalize != true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      chunk_count: ${{ steps.plan.outputs.chunk_count }}
      chunk_matrix: ${{ steps.plan.outputs.chunk_matrix }}
      expected_matrix: ${{ steps.plan.outputs.expected_matrix }}
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-build
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
            echo "[steam-catalog] .env written from GitHub secret"
          else
            echo "[steam-catalog] STEAM_API_KEY secret not available"
          fi

      - name: Process Official Reports
        run: |
          mkdir -p /tmp/protondb-output
          uv run python scripts/split_reports.py process \
            official-data/reports \
            /tmp/protondb-output

      - name: Seed official dump provenance metadata
        run: |
          uv run python scripts/split_reports.py seed-official-metadata \
            official-data/reports \
            /tmp/protondb-output

      - name: Backfill Missing Apps
        run: |
          uv run python scripts/split_reports.py backfill \
            /tmp/protondb-output

      - name: Build probe chunk plan
        id: plan
        env:
          RESUME_MODE: ${{ inputs.resume }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/split_reports.py probe-plan /tmp/protondb-output > /tmp/probe-plan.json
          bash scripts/probe-plan-emit.sh /tmp/probe-plan.json

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-build

      - name: Upload probe input artifact
        uses: actions/upload-artifact@v7
        with:
          name: probe-input
          path: |
            /tmp/protondb-output/data
            /tmp/protondb-output/pipeline-state.json

  # ── Stage 2: probe ProtonDB summaries in chunks ────────────────────
  probe-chunks:
    needs: build
    if: needs.build.outputs.chunk_count != '0'
    runs-on: ubuntu-24.04
    permissions:
      # write access needed to push each chunk's snapshot + manifest entry
      # to gh-pages/.pipeline-state/ for durable recovery (#171).
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chunk: ${{ fromJson(needs.build.outputs.chunk_matrix) }}
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Download probe input artifact
        uses: actions/download-artifact@v4
        with:
          name: probe-input
          path: /tmp/protondb-output

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-chunk-${{ matrix.chunk }}
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
          fi

      # Phase 4 of #171: idempotent skip. If the current probe cache
      # hashes to the same input_sha this chunk stored last time, the
      # state hasn't drifted -- probe would be a no-op. Skip it. Warm
      # reruns of the same dispatch (accidental double-trigger, resume
      # of an already-complete plan) become near-instant.
      - name: Idempotent check (#171 Phase 4)
        id: idem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/probe-idempotent-check.sh "${{ matrix.chunk }}"

      - name: Probe ProtonDB summary chunk ${{ matrix.chunk }}
        if: steps.idem.outputs.skip != 'true'
        run: |
          uv run python scripts/split_reports.py probe /tmp/protondb-output

      # Phase 1 of #171: durable chunk-state persistence. Snapshot the probe
      # cache + a manifest entry to gh-pages/.pipeline-state/ so a cancelled
      # run (chunk timeout, runner starvation, git-pages incident) doesn't
      # throw away the successful chunks' work. Skipped when the idempotent
      # check fired -- nothing changed, nothing to persist.
      - name: Persist chunk state to gh-pages (#171)
        if: always() && steps.idem.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/persist-chunk-state.sh "${{ matrix.chunk }}" "${{ github.run_id }}" "${{ github.run_attempt }}"

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-chunk-${{ matrix.chunk }}

  # ── Stage 3: finalize, build site, deploy to gh-pages ──────────────
  finalize:
    needs: [build, probe-chunks]
    if: |
      always() &&
      inputs.pages_only != true &&
      inputs.staging_only != true &&
      inputs.backfill_app_ids == '' &&
      inputs.coverage_backfill_issue_type == '' &&
      (inputs.finalize_only == true ||
        inputs.staging_with_finalize == true ||
        (needs.build.result == 'success' &&
         (needs.probe-chunks.result == 'success' || needs.probe-chunks.result == 'skipped')))
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      # finalize_only + staging_with_finalize both skip the build stage, so no
      # fresh artifact exists on this run. Skip the download in those modes and
      # let the gh-pages merge step below seed /tmp/protondb-output entirely
      # from the durable prod state -- exactly what we want when we're only
      # verifying a finalize / search-index shape change.
      - name: Download probe input artifact
        if: inputs.finalize_only != true && inputs.staging_with_finalize != true
        uses: actions/download-artifact@v4
        with:
          name: probe-input
          path: /tmp/protondb-output

      # Pull existing gh-pages data so probe-backfill can skip apps that were
      # already covered in prior runs. Without this, the artifact only carries
      # the small dump+manifest set (~8K apps), so the ~21K apps that were
      # probe-backfilled in previous runs look "missing" and get re-fetched
      # every single time (4+ hour stall). See wiki Data-Pipeline.md
      # "Known Issue" for full background.
      - name: Checkout current gh-pages for data merge
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data
          fetch-depth: 1
        continue-on-error: true

      - name: Merge gh-pages data into probe input
        run: |
          if [ -d gh-pages-data/data ]; then
            mkdir -p /tmp/protondb-output/data
            # -rn: recursive, no-clobber. Artifact wins on overlap (it's the
            # freshest dump from Stage 1), gh-pages fills the historical gaps
            # for probe-backfilled apps not in the artifact.
            cp -rn gh-pages-data/data/. /tmp/protondb-output/data/ || true
            ARTIFACT_COUNT=$(ls /tmp/protondb-output/data 2>/dev/null | wc -l)
            GHPAGES_COUNT=$(ls gh-pages-data/data 2>/dev/null | wc -l)
            echo "Merged data: artifact had ~${ARTIFACT_COUNT} app dirs after gh-pages merge (gh-pages had ${GHPAGES_COUNT})"
          else
            echo "No gh-pages data branch to merge (first run or branch absent)"
          fi
          # Seed image caches so daily runs only probe new/uncached app IDs.
          # release-years-cache.json (#109) restored the same way -- release
          # dates never change, so once the cache accumulates the 200/run
          # probe cap stays untouched on subsequent runs.
          cp gh-pages-data/game-images.json /tmp/protondb-output/ 2>/dev/null || true
          cp gh-pages-data/game-images-skip.json /tmp/protondb-output/ 2>/dev/null || true
          cp gh-pages-data/game-images-cache.json /tmp/protondb-output/ 2>/dev/null || true
          cp gh-pages-data/nonsteam-images-cache.json /tmp/protondb-output/ 2>/dev/null || true
          cp gh-pages-data/release-years-cache.json /tmp/protondb-output/ 2>/dev/null || true
          cp gh-pages-data/app-id-validation-cache.json /tmp/protondb-output/ 2>/dev/null || true

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-final
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      # Phase 2 of #171: source the probe cache from durable gh-pages state
      # instead of the ephemeral actions cache. Overwrites .cache/protondb-
      # summary-probe-cache.json with the last chunk's snapshot. Aborts loud
      # if any chunk in the FULL plan (expected_matrix) is missing so a
      # runner starvation event surfaces here instead of silently finalizing
      # on stale data. In finalize_only mode build was skipped so the script
      # falls back to whatever's in manifest.json (empty arg triggers that
      # branch). Skipped if the full plan is empty (chunk_count == 0).
      - name: Restore chunk state from gh-pages (#171)
        if: inputs.finalize_only == true || inputs.staging_with_finalize == true || needs.build.outputs.chunk_count != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/restore-chunk-state.sh '${{ needs.build.outputs.expected_matrix }}'

      # Seed the store catalog caches from gh-pages AFTER restoring the pipeline
      # cache, so the freshly rebuilt catalog (pushed by the dedicated GOG/Epic
      # workflows) wins over a stale copy carried in the actions cache. Doing
      # this before the restore let the old catalog clobber the new one, which
      # silently froze the GOG/Epic search-index stubs at an outdated count.
      - name: Seed store catalog caches from gh-pages
        run: |
          mkdir -p .cache
          cp gh-pages-data/gog-catalog-cache.json .cache/ 2>/dev/null || true
          cp gh-pages-data/epic-catalog-cache.json .cache/ 2>/dev/null || true

      # #89: log which caches survived the restore, their sizes + ages,
      # so the workflow output tells us at a glance whether the two cache
      # layers are actually doing their job. Prints one line per known
      # cache file with entries / bytes / age-in-days.
      - name: Cache-state stats (#89)
        run: bash scripts/log-cache-stats.sh post-restore

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
          fi

      # finalize_only + staging_with_finalize skip probing entirely, so there
      # are no newly-probed discoveries to reconcile. Skip this step in those
      # modes (it needs pipeline-state.json from the artifact, which isn't
      # generated on these paths).
      - name: Backfill Probe Discoveries
        if: inputs.finalize_only != true && inputs.staging_with_finalize != true
        run: |
          uv run python scripts/split_reports.py probe-backfill \
            /tmp/protondb-output

      # Synthesize pipeline-state.json from disk when the artifact is absent
      # (finalize_only + staging_with_finalize). Walks /tmp/protondb-output/data
      # for (app_id, year) tuples so finalize's read_pipeline_state has real
      # index_keys to iterate. Other fields are empty since there's no new
      # probing on these paths.
      - name: Synthesize pipeline-state from disk
        if: inputs.finalize_only == true || inputs.staging_with_finalize == true
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path
          root = Path("/tmp/protondb-output")
          data = root / "data"
          keys = []
          if data.is_dir():
              for app_dir in data.iterdir():
                  if not app_dir.is_dir():
                      continue
                  name = app_dir.name
                  # Reverse app_id_to_dir naming: gog_/epic_ prefixes become
                  # gog:/epic:; bare digits stay as-is.
                  if name.startswith("gog_"):
                      app_id = "gog:" + name[4:]
                  elif name.startswith("epic_"):
                      app_id = "epic:" + name[5:]
                  else:
                      app_id = name
                  for year_file in app_dir.glob("*.json"):
                      stem = year_file.stem
                      if stem in {"latest", "index", "votes", "metadata"}:
                          continue
                      keys.append([app_id, stem])
          state = {"parsed_count": 0, "index_keys": keys, "backfilled_keys": [], "no_data_app_ids": []}
          out = root / "pipeline-state.json"
          out.write_text(json.dumps(state, indent=2) + "\n")
          print(f"[synthesized-state] wrote {len(keys)} index_keys to {out}")
          PY

      - name: Finalize (Indexes + Coverage)
        env:
          # game_images.py falls through to SteamGridDB when Steam's
          # own APIs yield no header URL. Key is optional -- pipeline
          # tags the row "missing" cleanly if unset.
          SGDB_API_KEY: ${{ secrets.SGDB_API_KEY }}
          # Anon key + URL let game_images.py fetch admin overrides
          # (box_art_overrides table) via the anon-readable REST
          # endpoint. Optional -- if unset the pipeline runs as before
          # without seeding overrides.
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          uv run python scripts/split_reports.py finalize --skip-probe \
            /tmp/protondb-output

      - name: Hardware suggestions (PCI IDs)
        run: uv run python scripts/pipeline/hardware_suggestions.py

      - name: Approve pending reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run python scripts/pipeline/approve_reports.py

      - name: Copy catalog caches to output
        run: |
          cp .cache/gog-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true
          cp .cache/epic-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-final

      # Cloudflare target (#362): sync data/ to R2 + deploy the shell to Pages.
      # Runs instead of the gh-pages orphan deploy when deploy_target=cloudflare.
      # Must come BEFORE the orphan step, which wipes the working tree. Staging
      # runs target the staging Pages project; everything else targets prod.
      - name: Deploy to Cloudflare (R2 + Pages)
        if: inputs.deploy_target == 'cloudflare'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PAGES_PROJECT: ${{ (inputs.staging_with_pipeline == true || inputs.staging_with_finalize == true) && 'proton-pulse-web-staging' || 'proton-pulse-web' }}
          PAGES_BRANCH: ${{ (inputs.staging_with_pipeline == true || inputs.staging_with_finalize == true) && 'staging' || 'main' }}
        run: |
          bash scripts/publish-cloudflare.sh /tmp/protondb-output "$GITHUB_WORKSPACE"

      - name: Deploy to gh-pages (orphan, no history)
        if: inputs.staging_with_pipeline != true && inputs.staging_with_finalize != true && inputs.deploy_target != 'cloudflare'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Copy pipeline-helper scripts out of the workspace BEFORE the
          # `git rm -rf .` below wipes them. `git rm -rf .` deletes every
          # tracked file, including scripts/preserve-steam-type-cache.sh
          # which the deploy step needs to run later. Introduced by #263.
          cp scripts/preserve-steam-type-cache.sh /tmp/preserve-steam-type-cache.sh
          # Same reason: the cert monitor (#359) commits cert-status.json +
          # cert-history.json to gh-pages between pipeline runs. The orphan
          # rebuild would wipe them, losing the append-only burndown history.
          cp scripts/preserve-cert-monitor.sh /tmp/preserve-cert-monitor.sh
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r /tmp/protondb-output/data .
          cp /tmp/protondb-output/data-index.html .
          cp /tmp/protondb-output/coverage.html .
          cp /tmp/protondb-output/search-index.json . 2>/dev/null || true
          cp /tmp/protondb-output/search-index-steam-extended.json . 2>/dev/null || true
          cp /tmp/protondb-output/coverage-summary.json . 2>/dev/null || true
          cp /tmp/protondb-output/stats.json . 2>/dev/null || true
          cp /tmp/protondb-output/recent-reports.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-skip.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/nonsteam-images-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/release-years-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/gog-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/epic-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/most_played.json . 2>/dev/null || true
          cp /tmp/protondb-output/deck-status.json . 2>/dev/null || true
          cp /tmp/protondb-output/nonsteam-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/proton-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/data-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/steam-catalog.json . 2>/dev/null || true
          cp /tmp/protondb-output/hardware-suggestions.json . 2>/dev/null || true
          git show main:gh-pages-manifest.txt > gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            mkdir -p "$(dirname "$path")"
            git show main:"$path" > "$path" 2>/dev/null || true
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o form-schema.json
          mkdir -p badges
          # Fetch Pulse count from Supabase (hardcoded URL + fixed field read).
          # Download to a temp file first, then parse -- avoids the curl|python3
          # pipe pattern that Semgrep's gha-curl-pipe-shell rule flags.
          curl -sf \
            -H "apikey: sb_publishable_3Oqhm4JneafJNQw9BuUaxw_L9qZa-5V" \
            -H "Prefer: count=exact" \
            "https://ilsgdshkaocrmibwdezk.supabase.co/rest/v1/user_configs?select=count" \
            > /tmp/pulse-count.json 2>/dev/null || echo '[{"count":0}]' > /tmp/pulse-count.json
          PULSE_COUNT=$(python3 -c "import json; print(json.load(open('/tmp/pulse-count.json'))[0]['count'])" 2>/dev/null || echo "0")
          printf '{"schemaVersion":1,"label":"Pulse reports","message":"%s","color":"informational"}\n' "$PULSE_COUNT" > badges/pulse-reports.json
          # Preserve steam-type-cache.json + column 11 across the force-push
          # (#263). Reads the current origin/gh-pages, copies the cache in,
          # and re-applies its types to the fresh search-index.json before
          # we commit. Silent no-op on first ever deploy.
          bash /tmp/preserve-steam-type-cache.sh "$(pwd)"
          # Carry the cert monitor's files (#359) over from the old gh-pages so
          # the orphan force-push does not drop the burndown history.
          bash /tmp/preserve-cert-monitor.sh "$(pwd)"
          [ -f cert-status.json ] && git add cert-status.json || true
          [ -f cert-history.json ] && git add cert-history.json || true
          git add data/ data-index.html coverage.html search-index.json scoring-info.json form-schema.json badges/
          # add optional pipeline outputs (skip silently if a fresh checkout
          # didn't have them yet, e.g. first run after introducing the file)
          for f in coverage-summary.json stats.json recent-reports.json game-images.json game-images-skip.json game-images-cache.json nonsteam-images-cache.json release-years-cache.json gog-catalog-cache.json epic-catalog-cache.json most_played.json deck-status.json proton-versions.json steam-catalog.json hardware-suggestions.json nonsteam-images.json data-versions.json search-index-steam-extended.json app-id-redirects.json app-id-validation-cache.json steam-type-cache.json; do
            [ -f "$f" ] && git add "$f"
          done
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            git add "$path"
          done < gh-pages-manifest.txt
          VERSION=$(git show main:package.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('version','0.0.0'))")
          SHA=$(git rev-parse --short main)
          printf '{"version":"%s","sha":"%s","deployed_at":"%s","repo":"mdeguzis/proton-pulse-web"}\n' "$VERSION" "$SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          git add version.json
          git commit -m "Deploy: $(date +%F)"
          git push origin gh-pages-new:gh-pages --force

      # Staging deploy mode (#117 + #196): same finalize output as the prod
      # deploy step above, but pushed to the staging repo's gh-pages instead
      # of origin/gh-pages. Reads version/SHA from HEAD (staging branch) so
      # the About page reflects what's actually being tested. The prod and
      # staging deploy steps are mutually exclusive via the `if:` gates --
      # prod runs when neither staging flag is set; this step runs when
      # either staging_with_pipeline (full pipeline, 30 min) or
      # staging_with_finalize (finalize + stats only, ~5 min) is on.
      - name: Deploy pipeline output to staging repo
        if: (inputs.staging_with_pipeline == true || inputs.staging_with_finalize == true) && inputs.deploy_target != 'cloudflare'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan staging-pipeline-deploy
          git rm -rf .
          cp -r /tmp/protondb-output/data .
          cp /tmp/protondb-output/data-index.html .
          cp /tmp/protondb-output/coverage.html .
          cp /tmp/protondb-output/search-index.json . 2>/dev/null || true
          cp /tmp/protondb-output/search-index-steam-extended.json . 2>/dev/null || true
          cp /tmp/protondb-output/coverage-summary.json . 2>/dev/null || true
          cp /tmp/protondb-output/stats.json . 2>/dev/null || true
          cp /tmp/protondb-output/recent-reports.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-skip.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/nonsteam-images-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/release-years-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/gog-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/epic-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/most_played.json . 2>/dev/null || true
          cp /tmp/protondb-output/deck-status.json . 2>/dev/null || true
          cp /tmp/protondb-output/nonsteam-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/proton-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/data-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/steam-catalog.json . 2>/dev/null || true
          cp /tmp/protondb-output/hardware-suggestions.json . 2>/dev/null || true
          # Read shell files from HEAD (staging branch) so JS/CSS/HTML
          # match the code being tested, not whatever's on main.
          git show HEAD:gh-pages-manifest.txt > gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            mkdir -p "$(dirname "$path")"
            git show HEAD:"$path" > "$path" 2>/dev/null || true
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o form-schema.json
          # Preserve steam-type-cache.json + column 11 across the force-push (#263).
          # Staging repo's gh-pages holds its own copy; falls back to the prod
          # cache if staging has none yet.
          bash /tmp/preserve-steam-type-cache.sh "$(pwd)" gh-pages || true
          git add data/ data-index.html coverage.html search-index.json scoring-info.json form-schema.json
          for f in coverage-summary.json stats.json recent-reports.json game-images.json game-images-skip.json game-images-cache.json nonsteam-images-cache.json release-years-cache.json gog-catalog-cache.json epic-catalog-cache.json most_played.json deck-status.json proton-versions.json steam-catalog.json hardware-suggestions.json nonsteam-images.json data-versions.json search-index-steam-extended.json app-id-redirects.json app-id-validation-cache.json steam-type-cache.json; do
            [ -f "$f" ] && git add "$f"
          done
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            git add "$path"
          done < gh-pages-manifest.txt
          VERSION=$(git show HEAD:package.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('version','0.0.0'))")
          SHA=$(git rev-parse --short HEAD)
          printf '{"version":"%s","sha":"%s","deployed_at":"%s","repo":"mdeguzis/proton-pulse-web"}\n' "$VERSION" "$SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          git add version.json
          git commit -m "Staging pipeline: $(date +%F)"
          git remote add staging https://x-access-token:${{ secrets.STAGING_DEPLOY_TOKEN }}@github.com/mdeguzis/proton-pulse-web-staging.git
          git push staging staging-pipeline-deploy:gh-pages --force

      # NOTE: the production pipeline must NOT push to the staging site. Doing so
      # force-pushed main's (production) frontend over any in-review staging
      # preview, silently reverting staging to prod whenever this ran after a
      # `make gh-staging`. Staging is owned exclusively by the staging-preview
      # job (make gh-staging) and reads production data through the CDN
      # (USES_PROD_DATA in config.js), so it never needs a data sync from here.

  # ── Pages-only redeploy: refresh app/index shell files on gh-pages ─────────
  pages-only:
    if: inputs.pages_only == true && inputs.staging_only != true
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout current gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Republish GitHub Pages shell files
        run: |
          cd gh-pages-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          cp ../repo/gh-pages-manifest.txt ./gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            # some manifest entries (data-index.html, coverage.html) are
            # pipeline-generated and gitignored, so they won't exist in a
            # plain checkout. skip those and keep whatever gh-pages already has
            if [ -f "../repo/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "../repo/$path" "./$path"
            fi
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o ./scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o ./form-schema.json
          mkdir -p ./badges
          # Fetch Pulse count from Supabase (hardcoded URL + fixed field read).
          # Download to a temp file first, then parse -- avoids the curl|python3
          # pipe pattern that Semgrep's gha-curl-pipe-shell rule flags.
          curl -sf \
            -H "apikey: sb_publishable_3Oqhm4JneafJNQw9BuUaxw_L9qZa-5V" \
            -H "Prefer: count=exact" \
            "https://ilsgdshkaocrmibwdezk.supabase.co/rest/v1/user_configs?select=count" \
            > /tmp/pulse-count.json 2>/dev/null || echo '[{"count":0}]' > /tmp/pulse-count.json
          PULSE_COUNT=$(python3 -c "import json; print(json.load(open('/tmp/pulse-count.json'))[0]['count'])" 2>/dev/null || echo "0")
          printf '{"schemaVersion":1,"label":"Pulse reports","message":"%s","color":"informational"}\n' "$PULSE_COUNT" > ./badges/pulse-reports.json
          VERSION=$(cat ../repo/package.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('version','0.0.0'))")
          SHA=$(cd ../repo && git rev-parse --short HEAD)
          printf '{"version":"%s","sha":"%s","deployed_at":"%s","repo":"mdeguzis/proton-pulse-web"}\n' "$VERSION" "$SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          git add scoring-info.json form-schema.json badges/ version.json
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            git add "$path"
          done < gh-pages-manifest.txt
          if git diff --cached --quiet; then
            echo "No shell changes to publish."
            exit 0
          fi
          git commit -m "Pages shell refresh: $(date +%F)"
          git push origin gh-pages
          echo "Production updated. Staging is NOT touched -- run make gh-staging to update staging separately."

  # ── Targeted backfill: just backfill specific IDs and publish ──────
  targeted-backfill:
    if: inputs.backfill_app_ids != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
