name: Update ProtonDB Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Prepare output directory
        run: mkdir -p /tmp/protondb-output

      - name: Restore app names cache
        uses: actions/cache@v5
        with:
          path: /tmp/protondb-output/app-names-cache.json
          key: app-names-${{ github.run_id }}
          restore-keys: app-names-

      - name: Process and Split Reports
        working-directory: scripts-repo
        run: |
          # Targeting the 'reports' subfolder directly for speed and accuracy
          uv run python scripts/split_reports.py \
            ../official-data/reports \
            /tmp/protondb-output \
            --app-names-cache /tmp/protondb-output/app-names-cache.json

      - name: Sync processed data to scripts-repo
        run: |
          mkdir -p scripts-repo/data
          # Output is /tmp/protondb-output/data/{appId}/{year}.json
          # Copy the nested data/ contents into scripts-repo/data/
          cp -rv /tmp/protondb-output/data/. scripts-repo/data/
          cp /tmp/protondb-output/index.html scripts-repo/index.html

      - name: Commit and Push changes
        working-directory: scripts-repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ index.html
          # Only push if there are actual updates to the JSON data
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: ProtonDB split reports $(date +%F)"
            git pull --rebase origin main
            git push
          else
            echo "No new data changes detected. Skipping push."
          fi

      - name: Deploy to gh-pages
        working-directory: scripts-repo
        run: |
          # Create orphan gh-pages branch with only the servable content
          git checkout --orphan gh-pages-tmp
          git rm -rf .
          git checkout main -- data/ index.html
          git add data/ index.html
          git commit -m "Deploy: $(date +%F)"
          git push origin gh-pages-tmp:gh-pages --force
