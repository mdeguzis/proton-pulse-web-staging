name: Update ProtonDB Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      pages_only:
        description: "Republish GitHub Pages shell files plus static assets without running the data pipeline"
        required: false
        default: false
        type: boolean
      backfill_app_ids:
        description: "Comma-separated Steam app IDs to backfill and publish (skips full pipeline)"
        required: false
        default: ""
      coverage_backfill_issue_type:
        description: "Coverage issue type to backfill (no-titles, bad-app-id, no-protondb-data)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "no-titles"
          - "bad-app-id"
          - "no-protondb-data"
      coverage_backfill_limit:
        description: "Max matching apps to process for coverage-backfill. Use 0 for no limit."
        required: false
        default: "0"
      staging_only:
        description: "Deploy shell files to staging site only (no production deploy). Use to preview changes before pushing to prod."
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  PROTONDB_PROBE_LIMIT: "5000"
  PROTONDB_PROBE_BACKFILL_LIMIT: "0"
  PROTONDB_PROBE_LOG_EVERY: "100"

jobs:

  # ── Stage 1: process reports, backfill, compute probe plan ─────────
  build:
    if: inputs.pages_only != true && inputs.staging_only != true && inputs.backfill_app_ids == '' && inputs.coverage_backfill_issue_type == ''
    runs-on: ubuntu-24.04
    outputs:
      chunk_count: ${{ steps.plan.outputs.chunk_count }}
      chunk_matrix: ${{ steps.plan.outputs.chunk_matrix }}
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-build
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
            echo "[steam-catalog] .env written from GitHub secret"
          else
            echo "[steam-catalog] STEAM_API_KEY secret not available"
          fi

      - name: Process Official Reports
        run: |
          mkdir -p /tmp/protondb-output
          uv run python scripts/split_reports.py process \
            official-data/reports \
            /tmp/protondb-output

      - name: Seed official dump provenance metadata
        run: |
          uv run python scripts/split_reports.py seed-official-metadata \
            official-data/reports \
            /tmp/protondb-output

      - name: Backfill Missing Apps
        run: |
          uv run python scripts/split_reports.py backfill \
            /tmp/protondb-output

      - name: Build probe chunk plan
        id: plan
        run: |
          uv run python scripts/split_reports.py probe-plan /tmp/protondb-output > /tmp/probe-plan.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          plan = json.loads(Path("/tmp/probe-plan.json").read_text())
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"chunk_count={plan['chunk_count']}\n")
              fh.write(f"chunk_matrix={json.dumps(plan['chunks'])}\n")
          print(f"[protondb-probe] chunk_count={plan['chunk_count']}, uncached={plan['uncached_count']}")
          PY

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-build

      - name: Upload probe input artifact
        uses: actions/upload-artifact@v4
        with:
          name: probe-input
          path: |
            /tmp/protondb-output/data
            /tmp/protondb-output/pipeline-state.json

  # ── Stage 2: probe ProtonDB summaries in chunks ────────────────────
  probe-chunks:
    needs: build
    if: needs.build.outputs.chunk_count != '0'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chunk: ${{ fromJson(needs.build.outputs.chunk_matrix) }}
    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Download probe input artifact
        uses: actions/download-artifact@v4
        with:
          name: probe-input
          path: /tmp/protondb-output

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-chunk-${{ matrix.chunk }}
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
          fi

      - name: Probe ProtonDB summary chunk ${{ matrix.chunk }}
        run: |
          uv run python scripts/split_reports.py probe /tmp/protondb-output

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-chunk-${{ matrix.chunk }}

  # ── Stage 3: finalize, build site, deploy to gh-pages ──────────────
  finalize:
    needs: [build, probe-chunks]
    if: |
      always() &&
      inputs.pages_only != true &&
      inputs.backfill_app_ids == '' &&
      inputs.coverage_backfill_issue_type == '' &&
      needs.build.result == 'success' &&
      (needs.probe-chunks.result == 'success' || needs.probe-chunks.result == 'skipped')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Download probe input artifact
        uses: actions/download-artifact@v4
        with:
          name: probe-input
          path: /tmp/protondb-output

      # Pull existing gh-pages data so probe-backfill can skip apps that were
      # already covered in prior runs. Without this, the artifact only carries
      # the small dump+manifest set (~8K apps), so the ~21K apps that were
      # probe-backfilled in previous runs look "missing" and get re-fetched
      # every single time (4+ hour stall). See wiki Data-Pipeline.md
      # "Known Issue" for full background.
      - name: Checkout current gh-pages for data merge
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data
          fetch-depth: 1
        continue-on-error: true

      - name: Merge gh-pages data into probe input
        run: |
          if [ -d gh-pages-data/data ]; then
            mkdir -p /tmp/protondb-output/data
            # -rn: recursive, no-clobber. Artifact wins on overlap (it's the
            # freshest dump from Stage 1), gh-pages fills the historical gaps
            # for probe-backfilled apps not in the artifact.
            cp -rn gh-pages-data/data/. /tmp/protondb-output/data/ || true
            ARTIFACT_COUNT=$(ls /tmp/protondb-output/data 2>/dev/null | wc -l)
            GHPAGES_COUNT=$(ls gh-pages-data/data 2>/dev/null | wc -l)
            echo "Merged data: artifact had ~${ARTIFACT_COUNT} app dirs after gh-pages merge (gh-pages had ${GHPAGES_COUNT})"
          else
            echo "No gh-pages data branch to merge (first run or branch absent)"
          fi
          # Seed image caches so daily runs only probe new/uncached app IDs
          cp gh-pages-data/game-images.json /tmp/protondb-output/ 2>/dev/null || true
          cp gh-pages-data/game-images-skip.json /tmp/protondb-output/ 2>/dev/null || true
          cp gh-pages-data/game-images-cache.json /tmp/protondb-output/ 2>/dev/null || true

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-final
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      # Seed the store catalog caches from gh-pages AFTER restoring the pipeline
      # cache, so the freshly rebuilt catalog (pushed by the dedicated GOG/Epic
      # workflows) wins over a stale copy carried in the actions cache. Doing
      # this before the restore let the old catalog clobber the new one, which
      # silently froze the GOG/Epic search-index stubs at an outdated count.
      - name: Seed store catalog caches from gh-pages
        run: |
          mkdir -p .cache
          cp gh-pages-data/gog-catalog-cache.json .cache/ 2>/dev/null || true
          cp gh-pages-data/epic-catalog-cache.json .cache/ 2>/dev/null || true

      - name: Write local .env from secret
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
          fi

      - name: Backfill Probe Discoveries
        run: |
          uv run python scripts/split_reports.py probe-backfill \
            /tmp/protondb-output

      - name: Finalize (Indexes + Coverage)
        run: |
          uv run python scripts/split_reports.py finalize --skip-probe \
            /tmp/protondb-output

      - name: Hardware suggestions (PCI IDs)
        run: uv run python scripts/pipeline/hardware_suggestions.py

      - name: Approve pending reports
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run python scripts/pipeline/approve_reports.py

      - name: Copy catalog caches to output
        run: |
          cp .cache/gog-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true
          cp .cache/epic-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}-final

      - name: Deploy to gh-pages (orphan, no history)
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r /tmp/protondb-output/data .
          cp /tmp/protondb-output/data-index.html .
          cp /tmp/protondb-output/coverage.html .
          cp /tmp/protondb-output/search-index.json . 2>/dev/null || true
          cp /tmp/protondb-output/search-index-steam-extended.json . 2>/dev/null || true
          cp /tmp/protondb-output/coverage-summary.json . 2>/dev/null || true
          cp /tmp/protondb-output/stats.json . 2>/dev/null || true
          cp /tmp/protondb-output/recent-reports.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-skip.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/gog-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/epic-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/most_played.json . 2>/dev/null || true
          cp /tmp/protondb-output/nonsteam-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/proton-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/data-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/steam-catalog.json . 2>/dev/null || true
          cp /tmp/protondb-output/hardware-suggestions.json . 2>/dev/null || true
          git show main:gh-pages-manifest.txt > gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            mkdir -p "$(dirname "$path")"
            git show main:"$path" > "$path" 2>/dev/null || true
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o form-schema.json
          mkdir -p badges
          PULSE_COUNT=$(curl -s \
            -H "apikey: sb_publishable_3Oqhm4JneafJNQw9BuUaxw_L9qZa-5V" \
            -H "Prefer: count=exact" \
            "https://ilsgdshkaocrmibwdezk.supabase.co/rest/v1/user_configs?select=count" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['count'])" 2>/dev/null || echo "0")
          printf '{"schemaVersion":1,"label":"Pulse reports","message":"%s","color":"informational"}\n' "$PULSE_COUNT" > badges/pulse-reports.json
          git add data/ data-index.html coverage.html search-index.json scoring-info.json form-schema.json badges/
          # add optional pipeline outputs (skip silently if a fresh checkout
          # didn't have them yet, e.g. first run after introducing the file)
          for f in coverage-summary.json stats.json recent-reports.json game-images.json game-images-skip.json game-images-cache.json gog-catalog-cache.json epic-catalog-cache.json most_played.json proton-versions.json steam-catalog.json hardware-suggestions.json nonsteam-images.json data-versions.json search-index-steam-extended.json; do
            [ -f "$f" ] && git add "$f"
          done
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            git add "$path"
          done < gh-pages-manifest.txt
          VERSION=$(git show main:package.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('version','0.0.0'))")
          SHA=$(git rev-parse --short main)
          printf '{"version":"%s","sha":"%s","deployed_at":"%s","repo":"mdeguzis/proton-pulse-web"}\n' "$VERSION" "$SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          git add version.json
          git commit -m "Deploy: $(date +%F)"
          git push origin gh-pages-new:gh-pages --force

      # NOTE: the production pipeline must NOT push to the staging site. Doing so
      # force-pushed main's (production) frontend over any in-review staging
      # preview, silently reverting staging to prod whenever this ran after a
      # `make gh-staging`. Staging is owned exclusively by the staging-preview
      # job (make gh-staging) and reads production data through the CDN
      # (USES_PROD_DATA in config.js), so it never needs a data sync from here.

  # ── Pages-only redeploy: refresh app/index shell files on gh-pages ─────────
  pages-only:
    if: inputs.pages_only == true && inputs.staging_only != true
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout current gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Republish GitHub Pages shell files
        run: |
          cd gh-pages-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          cp ../repo/gh-pages-manifest.txt ./gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            # some manifest entries (data-index.html, coverage.html) are
            # pipeline-generated and gitignored, so they won't exist in a
            # plain checkout. skip those and keep whatever gh-pages already has
            if [ -f "../repo/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "../repo/$path" "./$path"
            fi
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o ./scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o ./form-schema.json
          mkdir -p ./badges
          PULSE_COUNT=$(curl -s \
            -H "apikey: sb_publishable_3Oqhm4JneafJNQw9BuUaxw_L9qZa-5V" \
            -H "Prefer: count=exact" \
            "https://ilsgdshkaocrmibwdezk.supabase.co/rest/v1/user_configs?select=count" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['count'])" 2>/dev/null || echo "0")
          printf '{"schemaVersion":1,"label":"Pulse reports","message":"%s","color":"informational"}\n' "$PULSE_COUNT" > ./badges/pulse-reports.json
          VERSION=$(cat ../repo/package.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('version','0.0.0'))")
          SHA=$(cd ../repo && git rev-parse --short HEAD)
          printf '{"version":"%s","sha":"%s","deployed_at":"%s","repo":"mdeguzis/proton-pulse-web"}\n' "$VERSION" "$SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          git add scoring-info.json form-schema.json badges/ version.json
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            git add "$path"
          done < gh-pages-manifest.txt
          if git diff --cached --quiet; then
            echo "No shell changes to publish."
            exit 0
          fi
          git commit -m "Pages shell refresh: $(date +%F)"
          git push origin gh-pages
          echo "Production updated. Staging is NOT touched -- run make gh-staging to update staging separately."

  # ── Targeted backfill: just backfill specific IDs and publish ──────
  targeted-backfill:
    if: inputs.backfill_app_ids != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: gh-pages
          path: gh-pages-data

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: repo

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: repo
        run: uv sync

      - name: Write local .env from secret
        working-directory: repo
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
          fi

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: repo/.cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-targeted
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Prepare output from existing gh-pages data
        run: |
          mkdir -p /tmp/protondb-output
          if [ -d gh-pages-data/data ]; then
            cp -r gh-pages-data/data /tmp/protondb-output/data
          else
            mkdir -p /tmp/protondb-output/data
          fi
          mkdir -p repo/.cache
          cp gh-pages-data/gog-catalog-cache.json repo/.cache/ 2>/dev/null || true
          cp gh-pages-data/epic-catalog-cache.json repo/.cache/ 2>/dev/null || true

      - name: Repair official dump provenance metadata
        working-directory: repo
        run: |
          uv run python scripts/split_reports.py seed-official-metadata \
            ../official-data/reports \
            /tmp/protondb-output

      - name: Initialize pipeline state
        working-directory: repo
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          output = Path("/tmp/protondb-output")
          state_file = output / "pipeline-state.json"
          data_dir = output / "data"

          # build index_keys from existing data dirs
          index_keys = []
          if data_dir.is_dir():
              for app_dir in sorted(data_dir.iterdir()):
                  if not app_dir.is_dir():
                      continue
                  for json_file in app_dir.glob("*.json"):
                      if json_file.stem in ("index", "latest", "votes", "metadata"):
                          continue
                      index_keys.append([app_dir.name, json_file.stem])

          state = {
              "parsed_count": 0,
              "index_keys": index_keys,
              "backfilled_keys": [],
          }
          state_file.write_text(json.dumps(state))
          print(f"[targeted-backfill] Initialized state with {len(index_keys)} existing index keys")
          PY

      - name: Backfill targeted app IDs
        working-directory: repo
        run: |
          echo "[targeted-backfill] App IDs: ${{ inputs.backfill_app_ids }}"
          uv run python scripts/split_reports.py backfill \
            --app-ids "${{ inputs.backfill_app_ids }}" \
            /tmp/protondb-output

      - name: Reindex targeted apps
        working-directory: repo
        run: |
          uv run python scripts/split_reports.py reindex \
            --app-ids "${{ inputs.backfill_app_ids }}" \
            /tmp/protondb-output

      - name: Regenerate indexes and coverage report
        working-directory: repo
        run: |
          uv run python scripts/split_reports.py finalize --skip-probe \
            /tmp/protondb-output

      - name: Copy catalog caches to output
        run: |
          cp repo/.cache/gog-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true
          cp repo/.cache/epic-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: repo/.cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-targeted

      - name: Deploy to gh-pages (orphan, no history)
        working-directory: repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r /tmp/protondb-output/data .
          cp /tmp/protondb-output/data-index.html .
          cp /tmp/protondb-output/coverage.html .
          cp /tmp/protondb-output/search-index.json . 2>/dev/null || true
          cp /tmp/protondb-output/search-index-steam-extended.json . 2>/dev/null || true
          cp /tmp/protondb-output/coverage-summary.json . 2>/dev/null || true
          cp /tmp/protondb-output/stats.json . 2>/dev/null || true
          cp /tmp/protondb-output/recent-reports.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-skip.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/gog-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/epic-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/most_played.json . 2>/dev/null || true
          cp /tmp/protondb-output/nonsteam-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/proton-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/data-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/steam-catalog.json . 2>/dev/null || true
          cp /tmp/protondb-output/hardware-suggestions.json . 2>/dev/null || true
          git show main:gh-pages-manifest.txt > gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            mkdir -p "$(dirname "$path")"
            git show main:"$path" > "$path" 2>/dev/null || true
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o form-schema.json
          mkdir -p badges
          PULSE_COUNT=$(curl -s \
            -H "apikey: sb_publishable_3Oqhm4JneafJNQw9BuUaxw_L9qZa-5V" \
            -H "Prefer: count=exact" \
            "https://ilsgdshkaocrmibwdezk.supabase.co/rest/v1/user_configs?select=count" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['count'])" 2>/dev/null || echo "0")
          printf '{"schemaVersion":1,"label":"Pulse reports","message":"%s","color":"informational"}\n' "$PULSE_COUNT" > badges/pulse-reports.json
          git add data/ data-index.html coverage.html search-index.json scoring-info.json form-schema.json badges/
          # add optional pipeline outputs (skip silently if a fresh checkout
          # didn't have them yet, e.g. first run after introducing the file)
          for f in coverage-summary.json stats.json recent-reports.json game-images.json game-images-skip.json game-images-cache.json gog-catalog-cache.json epic-catalog-cache.json most_played.json proton-versions.json steam-catalog.json hardware-suggestions.json nonsteam-images.json data-versions.json search-index-steam-extended.json; do
            [ -f "$f" ] && git add "$f"
          done
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            git add "$path"
          done < gh-pages-manifest.txt
          git commit -m "Targeted backfill: ${{ inputs.backfill_app_ids }}"
          git push origin gh-pages-new:gh-pages --force

  # ── Coverage-based backfill: fix missing titles, no-data apps, etc ──
  coverage-backfill:
    if: inputs.coverage_backfill_issue_type != ''
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: gh-pages
          path: gh-pages-data

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: repo

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: repo
        run: uv sync

      - name: Restore pipeline cache
        uses: actions/cache/restore@v4
        with:
          path: repo/.cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-coverage
          restore-keys: |
            pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-

      - name: Write local .env from secret
        working-directory: repo
        run: |
          if [ -n "${{ secrets.STEAM_API_KEY }}" ]; then
            printf 'STEAM_API_KEY=%s\n' "${{ secrets.STEAM_API_KEY }}" > .env
            echo "[steam-catalog] .env written from GitHub secret"
          else
            echo "[steam-catalog] STEAM_API_KEY secret not available"
          fi

      - name: Prepare output from existing gh-pages data
        run: |
          mkdir -p /tmp/protondb-output
          if [ -d gh-pages-data/data ]; then
            cp -r gh-pages-data/data /tmp/protondb-output/data
          else
            mkdir -p /tmp/protondb-output/data
          fi
          mkdir -p repo/.cache
          cp gh-pages-data/gog-catalog-cache.json repo/.cache/ 2>/dev/null || true
          cp gh-pages-data/epic-catalog-cache.json repo/.cache/ 2>/dev/null || true

      - name: Repair official dump provenance metadata
        working-directory: repo
        run: |
          uv run python scripts/split_reports.py seed-official-metadata \
            ../official-data/reports \
            /tmp/protondb-output

      - name: Initialize pipeline state
        working-directory: repo
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          output = Path("/tmp/protondb-output")
          state_file = output / "pipeline-state.json"
          data_dir = output / "data"

          index_keys = []
          if data_dir.is_dir():
              for app_dir in sorted(data_dir.iterdir()):
                  if not app_dir.is_dir():
                      continue
                  for json_file in app_dir.glob("*.json"):
                      if json_file.stem in ("index", "latest", "votes", "metadata"):
                          continue
                      index_keys.append([app_dir.name, json_file.stem])

          state = {
              "parsed_count": 0,
              "index_keys": index_keys,
              "backfilled_keys": [],
              "no_data_app_ids": [],
          }
          state_file.write_text(json.dumps(state))
          print(f"[coverage-backfill] Initialized state with {len(index_keys)} existing index keys")
          PY

      - name: Run coverage backfill
        working-directory: repo
        run: |
          echo "[coverage-backfill] Issue type: ${{ inputs.coverage_backfill_issue_type }}"
          echo "[coverage-backfill] Limit: ${{ inputs.coverage_backfill_limit }}"
          echo "[coverage-backfill] Allow unbounded: ${{ inputs.coverage_backfill_allow_unbounded }}"
          LIMIT_ARG=""
          if [ "${{ inputs.coverage_backfill_limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ inputs.coverage_backfill_limit }}"
          fi
          ALLOW_UNBOUNDED_ARG=""
          if [ "${{ inputs.coverage_backfill_allow_unbounded }}" = "true" ]; then
            ALLOW_UNBOUNDED_ARG="--allow-unbounded"
          fi
          uv run python scripts/split_reports.py coverage-backfill \
            --issue-type "${{ inputs.coverage_backfill_issue_type }}" \
            $LIMIT_ARG \
            $ALLOW_UNBOUNDED_ARG \
            /tmp/protondb-output

      - name: Reindex affected apps
        working-directory: repo
        run: |
          python - <<'PY'
          import json, subprocess, sys
          from pathlib import Path

          state = json.loads(Path("/tmp/protondb-output/pipeline-state.json").read_text())
          backfilled = state.get("backfilled_keys", [])
          app_ids = sorted(set(k[0] for k in backfilled if len(k) == 2))
          if not app_ids:
              print("[coverage-backfill] No apps were backfilled; skipping reindex")
              sys.exit(0)
          ids_str = ",".join(app_ids)
          print(f"[coverage-backfill] Reindexing {len(app_ids)} app(s): {ids_str[:200]}")
          subprocess.run(
              ["uv", "run", "python", "scripts/split_reports.py", "reindex", "--app-ids", ids_str, "/tmp/protondb-output"],
              check=True,
          )
          PY

      - name: Regenerate indexes and coverage report
        working-directory: repo
        run: |
          uv run python scripts/split_reports.py finalize --skip-probe \
            /tmp/protondb-output

      - name: Copy catalog caches to output
        run: |
          cp repo/.cache/gog-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true
          cp repo/.cache/epic-catalog-cache.json /tmp/protondb-output/ 2>/dev/null || true

      - name: Save pipeline cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: repo/.cache
          key: pipeline-cache-${{ runner.os }}-${{ github.workflow }}-${{ github.ref_name }}-coverage

      - name: Deploy to gh-pages (orphan, no history)
        working-directory: repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout --orphan gh-pages-new
          git rm -rf .
          cp -r /tmp/protondb-output/data .
          cp /tmp/protondb-output/data-index.html .
          cp /tmp/protondb-output/coverage.html .
          cp /tmp/protondb-output/search-index.json . 2>/dev/null || true
          cp /tmp/protondb-output/search-index-steam-extended.json . 2>/dev/null || true
          cp /tmp/protondb-output/coverage-summary.json . 2>/dev/null || true
          cp /tmp/protondb-output/stats.json . 2>/dev/null || true
          cp /tmp/protondb-output/recent-reports.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-skip.json . 2>/dev/null || true
          cp /tmp/protondb-output/game-images-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/gog-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/epic-catalog-cache.json . 2>/dev/null || true
          cp /tmp/protondb-output/most_played.json . 2>/dev/null || true
          cp /tmp/protondb-output/nonsteam-images.json . 2>/dev/null || true
          cp /tmp/protondb-output/proton-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/data-versions.json . 2>/dev/null || true
          cp /tmp/protondb-output/steam-catalog.json . 2>/dev/null || true
          cp /tmp/protondb-output/hardware-suggestions.json . 2>/dev/null || true
          git show main:gh-pages-manifest.txt > gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            mkdir -p "$(dirname "$path")"
            git show main:"$path" > "$path" 2>/dev/null || true
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o form-schema.json
          mkdir -p badges
          PULSE_COUNT=$(curl -s \
            -H "apikey: sb_publishable_3Oqhm4JneafJNQw9BuUaxw_L9qZa-5V" \
            -H "Prefer: count=exact" \
            "https://ilsgdshkaocrmibwdezk.supabase.co/rest/v1/user_configs?select=count" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['count'])" 2>/dev/null || echo "0")
          printf '{"schemaVersion":1,"label":"Pulse reports","message":"%s","color":"informational"}\n' "$PULSE_COUNT" > badges/pulse-reports.json
          git add data/ data-index.html coverage.html search-index.json scoring-info.json form-schema.json badges/
          # add optional pipeline outputs (skip silently if a fresh checkout
          # didn't have them yet, e.g. first run after introducing the file)
          for f in coverage-summary.json stats.json recent-reports.json game-images.json game-images-skip.json game-images-cache.json gog-catalog-cache.json epic-catalog-cache.json most_played.json proton-versions.json steam-catalog.json hardware-suggestions.json nonsteam-images.json data-versions.json search-index-steam-extended.json; do
            [ -f "$f" ] && git add "$f"
          done
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            git add "$path"
          done < gh-pages-manifest.txt
          git commit -m "Coverage backfill: ${{ inputs.coverage_backfill_issue_type }}"
          git push origin gh-pages-new:gh-pages --force

  # ── Status report (runs even on failure) ───────────────────────────
  report-build-status:
    needs: [build, probe-chunks, finalize, targeted-backfill, coverage-backfill]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### Update ProtonDB Data" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ inputs.coverage_backfill_issue_type }}" ]; then
            echo "**Mode:** Coverage backfill" >> "$GITHUB_STEP_SUMMARY"
            echo "**Issue type:** ${{ inputs.coverage_backfill_issue_type }}" >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ inputs.coverage_backfill_limit }}" = "0" ]; then
              echo "**Limit:** unbounded" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "**Limit:** ${{ inputs.coverage_backfill_limit }}" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "**Allow unbounded:** ${{ inputs.coverage_backfill_allow_unbounded }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Coverage backfill | ${{ needs.coverage-backfill.result }} |" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "${{ inputs.backfill_app_ids }}" ]; then
            echo "**Mode:** Targeted backfill" >> "$GITHUB_STEP_SUMMARY"
            echo "**App IDs:** ${{ inputs.backfill_app_ids }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Targeted backfill | ${{ needs.targeted-backfill.result }} |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Probe chunks | ${{ needs.probe-chunks.result }} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Finalize + Deploy | ${{ needs.finalize.result }} |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1

  # ── Staging-only preview: deploy shell files to staging, skip production ──
  staging-preview:
    if: inputs.staging_only == true
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout current gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data
          persist-credentials: false

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: staging
          path: repo
          persist-credentials: false

      - name: Build staging copy
        run: |
          cd gh-pages-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          cp ../repo/gh-pages-manifest.txt ./gh-pages-manifest.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            case "$path" in \#*) continue ;; esac
            if [ -f "../repo/$path" ]; then
              mkdir -p "$(dirname "$path")"
              cp "../repo/$path" "./$path"
            fi
          done < gh-pages-manifest.txt
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/scoring-info.json -o ./scoring-info.json
          curl -sL https://raw.githubusercontent.com/mdeguzis/decky-proton-pulse/main/src/data/form-schema.json -o ./form-schema.json
          VERSION=$(cat ../repo/package.json | python3 -c "import json,sys; print(json.load(sys.stdin).get('version','0.0.0'))")
          SHA=$(cd ../repo && git rev-parse --short HEAD)
          printf '{"version":"%s","sha":"%s","deployed_at":"%s","repo":"mdeguzis/proton-pulse-web"}\n' "$VERSION" "$SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > version.json
          git add version.json
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes vs current staging."
          else
            git add -A
            git commit -m "Staging preview: $(date +%F)"
          fi

      - name: Check Supabase SITE_URL
        run: |
          RESP=$(curl -sf "https://ilsgdshkaocrmibwdezk.supabase.co/functions/v1/steam-callback?health=1" || echo '{}')
          SITE_URL=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin).get('site_url',''))" 2>/dev/null || echo '')
          echo "steam-callback SITE_URL: $SITE_URL"
          if [ -z "$SITE_URL" ]; then
            echo "WARNING: health endpoint not available on deployed function (deploy-functions.yml may not have run yet). Skipping check."
          elif [ "$SITE_URL" != "https://www.proton-pulse.com" ]; then
            echo "ERROR: SITE_URL is '$SITE_URL', expected 'https://www.proton-pulse.com'. Update the SITE_URL secret in Supabase before deploying."
            exit 1
          else
            echo "SITE_URL OK"
          fi

      - name: Push to staging
        run: |
          cd gh-pages-data
          git remote add staging https://x-access-token:${{ secrets.STAGING_DEPLOY_TOKEN }}@github.com/mdeguzis/proton-pulse-web-staging.git
          git checkout --orphan staging-deploy
          git add -A
          git commit -m "Staging preview: $(date +%F)" --allow-empty
          git push staging staging-deploy:gh-pages --force
