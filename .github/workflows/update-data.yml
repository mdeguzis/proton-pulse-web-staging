name: Update ProtonDB Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install ijson

      - name: Debug Filesystem
        run: |
          echo "--- Verifying Official Data Checkout ---"
          ls -R official-data | grep ":$" | sed -e 's/:$//' -e 's/[^-][^\/]*\//--/g' -e 's/^/   /' | head -n 20

      - name: Run Processing Script
        run: |
          mkdir -p /tmp/protondb-output
          python3 scripts-repo/scripts/split_reports.py \
            official-data \
            /tmp/protondb-output

      - name: Deploy to GitHub Pages
        run: |
          cd /tmp/protondb-output
          
          if [ ! -d "data" ] || [ -z "$(ls -A data)" ]; then
            echo "Error: No data files generated. Check script logs above."
            exit 1
          fi

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          
          GAMES_COUNT=$(jq '.total_games' manifest.json)
          
          # Simple index for GH Pages
          echo "<h1>Proton Pulse Sync</h1><p>Games: $GAMES_COUNT</p><p>Updated: $(date -u)</p>" > index.html
          touch .nojekyll

          git add -A
          git commit -m "chore: auto-sync $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
