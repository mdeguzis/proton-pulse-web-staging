name: Daily Data Sync

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch:   # Allow manual triggers

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Scripts
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Checkout Official ProtonDB Data
        uses: actions/checkout@v4
        with:
          repository: bdefore/protondb-data
          path: official-data
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install ijson

      - name: Pre-Run Debug
        run: |
          echo "--- Current Workdir ---"
          pwd
          echo "--- Listing 'official-data' structure ---"
          find official-data -maxdepth 2
          echo "--- Checking for JSON files in official-data/reports ---"
          find official-data/reports -name "*.json" | head -n 5 || echo "No JSONs found in reports/"

      - name: Run Processing Script
        run: |
          mkdir -p /tmp/protondb-output
          # We point it to official-data/reports specifically to ensure it finds the JSONs
          python3 scripts-repo/scripts/split_reports.py \
            official-data/reports \
            /tmp/protondb-output

      - name: Deploy to GitHub Pages
        run: |
          cd /tmp/protondb-output
          
          # Final sanity check
          if [ ! -d "data" ] || [ -z "$(ls -A data)" ]; then
            echo "Error: No data files generated in /tmp/protondb-output/data"
            exit 1
          fi

          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          
          # Generate simple health page
          GAMES_COUNT=$(jq '.total_games' manifest.json)
          REPORTS_COUNT=$(jq '.total_reports' manifest.json)
          
          cat <<EOF > index.html
          <html>
            <body style="font-family:sans-serif; background:#111; color:#eee; padding:2rem;">
              <h1>Proton Pulse Mirror Status</h1>
              <p>Last Sync: $(date -u)</p>
              <p>Games: $GAMES_COUNT | Reports: $REPORTS_COUNT</p>
            </body>
          </html>
          EOF

          touch .nojekyll
          git add -A
          git commit -m "chore: data sync $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        git push --force origin gh-pages
