name: Update ProtonDB Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dump_url:
        description: 'Override dump URL (Leave blank for latest)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout scripts-repo
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ijson

      - name: Download Active Dump
        id: download
        run: |
          URL="${{ github.event.inputs.dump_url }}"
          if [ -z "$URL" ]; then
            # Using the raw GitHub content link from the official static repo
            URL="https://github.com/ProtonDB/static/raw/master/reports.json.gz"
          fi
          
          echo "Attempting download from: $URL"
          
          # Use -f to fail on HTTP errors and -L to follow redirects
          curl -f -L -A "Mozilla/5.0" --progress-bar "$URL" -o /tmp/protondb-dump.json.gz
          
          # Final binary check
          if file /tmp/protondb-dump.json.gz | grep -q "gzip compressed data"; then
            echo "Success: Valid Gzip file received."
          else
            echo "ERROR: Received non-gzip data."
            file /tmp/protondb-dump.json.gz
            exit 1
          fi

      - name: Split reports by game
        run: |
          mkdir -p /tmp/protondb-output
          python3 scripts-repo/scripts/split_reports.py \
            /tmp/protondb-dump.json.gz \
            /tmp/protondb-output

      - name: Publish to gh-pages
        run: |
          cd /tmp/protondb-output
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          touch .nojekyll
          git add -A
          git commit -m "chore: active data sync $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
