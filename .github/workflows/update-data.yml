name: Update ProtonDB Data

on:
  schedule:
    # Run daily at 6 AM to keep data fresh
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dump_url:
        description: 'Override dump URL (Leave blank for latest)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout scripts-repo
        uses: actions/checkout@v4
        with:
          path: scripts-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ijson

      - name: Prepare Download URL
        id: detect
        run: |
          URL="${{ github.event.inputs.dump_url }}"
          if [ -z "$URL" ]; then
            # This is the ACTIVE daily-updated source
            URL="https://raw.githubusercontent.com/ProtonDB/static/master/reports.json.gz"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Selected active dump URL: $URL"

      - name: Download Active ProtonDB dump
        run: |
          echo "Downloading latest reports..."
          # We use a custom User-Agent to avoid the b'40' / 403 Forbidden errors
          curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --progress-bar \
            "${{ steps.detect.outputs.url }}" \
            -o /tmp/protondb-dump.json.gz

      - name: Split reports by game
        run: |
          mkdir -p /tmp/protondb-output
          python3 scripts-repo/scripts/split_reports.py \
            /tmp/protondb-dump.json.gz \
            /tmp/protondb-output

      - name: Publish to gh-pages
        run: |
          cd /tmp/protondb-output
          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages
          touch .nojekyll
          git add -A
          git commit -m "chore: active data update $(date -u +%Y-%m-%d)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
