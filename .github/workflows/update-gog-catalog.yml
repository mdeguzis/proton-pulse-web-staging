name: Update GOG Catalog

on:
  schedule:
    - cron: "0 3 * * 0"  # weekly, Sunday 3am UTC
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force re-fetch even if cache is fresh"
        type: boolean
        default: false
      # Standardized inputs (#218).
      issue_id:
        description: "GitHub issue to comment run summary back on (leave blank to skip)"
        required: false
        default: ""
      dry_run:
        description: "Skip cache writes; log what would change"
        type: boolean
        default: false

jobs:
  update-gog-catalog:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Checkout gh-pages for existing catalog cache
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages-data
          fetch-depth: 1
        continue-on-error: true

      - name: Seed catalog cache from gh-pages
        run: |
          mkdir -p .cache
          cp gh-pages-data/gog-catalog-cache.json .cache/ 2>/dev/null || true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Fetch GOG catalog
        run: uv run python scripts/fetch_gog_catalog.py
        env:
          FORCE_REFRESH: ${{ inputs.force_refresh }}

      - name: Commit catalog cache to gh-pages
        if: inputs.dry_run != true
        run: |
          cd gh-pages-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git pull --rebase origin gh-pages
          cp ../.cache/gog-catalog-cache.json .
          git add gog-catalog-cache.json
          git diff --cached --quiet && echo "Cache unchanged, nothing to commit" || git commit -m "chore: refresh GOG catalog cache $(date +%F)"
          git push origin gh-pages

      - name: Back-comment run summary on issue
        if: always()
        uses: ./.github/actions/back-comment-run
        with:
          issue_id: ${{ inputs.issue_id }}
          status: ${{ job.status }}
          workflow_name: update-gog-catalog
          dry_run: ${{ inputs.dry_run }}
