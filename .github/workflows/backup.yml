name: Backup

on:
  schedule:
    # Weekly, Sunday at 04:00 UTC.
    - cron: "0 4 * * 0"
  workflow_run:
    workflows: ["Build Site Data"]
    types: [completed]
  workflow_dispatch:
    inputs:
      type:
        description: "What to back up"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - schema
          - user_configs
          - author_avatars
          - site
      # Standardized inputs (#218). backup doesn't take app_ids.
      issue_id:
        description: "GitHub issue to comment run summary back on (leave blank to skip)"
        required: false
        default: ""
      dry_run:
        description: "Produce backup artifacts locally but skip the upload to the backup repo"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
    # For workflow_run triggers, only run if the upstream workflow succeeded.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout gh-pages (for site backup)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-site

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set backup date and timestamp
        id: date
        run: |
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "ts=$(date -u +%Y-%m-%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKUP_HMAC_SECRET: ${{ secrets.BACKUP_HMAC_SECRET }}
          BACKUP_DATE: ${{ steps.date.outputs.date }}
          BACKUP_TYPE: ${{ inputs.type || 'all' }}
          SITE_DIR: gh-pages-site
          OUT_DIR: backup-out
        run: node .github/scripts/backup.mjs

      - name: Set trigger label
        id: trigger
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "label=scheduled" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "label=post-deploy" >> "$GITHUB_OUTPUT"
          else
            echo "label=manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release and update backups.jsonl
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          DATE: ${{ steps.date.outputs.date }}
          TS:   ${{ steps.date.outputs.ts }}
          TRIGGER: ${{ steps.trigger.outputs.label }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          # Tag format: backup-{DATE}-{TRIGGER} for scheduled (once/week, safe to overwrite same-day)
          #             backup-{TS}-{TRIGGER}   for post-deploy and manual (can run multiple times/day)
          if [[ "$TRIGGER" == "scheduled" ]]; then
            export TAG="backup-${DATE}-${TRIGGER}"
          else
            export TAG="backup-${TS}-${TRIGGER}"
          fi

          RELEASE_TITLE="Backup ${DATE} (${TRIGGER})"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          RELEASE_NOTES="**Trigger:** ${TRIGGER}
          **Run:** ${RUN_URL}
          **Source commit:** ${COMMIT_URL}"

          # Delete existing release+tag of the same name if present (scheduled overwrite)
          gh release delete "$TAG" \
            --repo mdeguzis/proton-pulse-data-backup \
            --yes 2>/dev/null || true

          # Create release and upload all tarballs as assets
          gh release create "$TAG" backup-out/*.tar.gz \
            --repo mdeguzis/proton-pulse-data-backup \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            --latest=false

          RELEASE_URL="https://github.com/mdeguzis/proton-pulse-data-backup/releases/tag/${TAG}"
          echo "Release published: $RELEASE_URL"

          # Clone backup repo to update latest/ and backups.jsonl
          git clone https://x-access-token:${BACKUP_REPO_TOKEN}@github.com/mdeguzis/proton-pulse-data-backup.git backup-repo

          # Overwrite latest/ with the current tarballs (stable filenames, always current)
          mkdir -p backup-repo/latest
          for f in backup-out/*.tar.gz; do
            base="${f##*backup-out/backup-${DATE}-}"   # strip prefix → e.g. schema.tar.gz
            cp "$f" "backup-repo/latest/latest-${base}"
          done

          python3 - <<'PYEOF'
          import json, os

          repo     = os.environ['GITHUB_REPOSITORY']
          run_id   = os.environ['GITHUB_RUN_ID']
          base_url = os.environ['GITHUB_SERVER_URL']
          tag      = os.environ['TAG']
          date     = os.environ['DATE']

          manifest = json.load(open('backup-out/backup-manifest.json'))
          release_url = f'https://github.com/mdeguzis/proton-pulse-data-backup/releases/tag/{tag}'
          entry = {
            'ts':          manifest['ts'],
            'date':        date,
            'tag':         tag,
            'trigger':     os.environ['TRIGGER'],
            'release_url': release_url,
            'run_id':      run_id,
            'run_url':     f'{base_url}/{repo}/actions/runs/{run_id}',
            'source_sha':  os.environ['GITHUB_SHA'],
            'source_url':  f'{base_url}/{repo}/commit/{os.environ["GITHUB_SHA"]}',
            'assets': [
              {
                'name':         f['name'],
                'size_bytes':   f['size_bytes'],
                'row_count':    f['row_count'],
                'download_url': f'{release_url}/{f["name"]}',
              }
              for f in manifest['files']
            ],
          }
          log_path = 'backup-repo/backups.jsonl'
          with open(log_path, 'a') as f:
            f.write(json.dumps(entry) + '\n')
          print(f'Appended to {log_path}: tag={tag}')
          PYEOF

          cd backup-repo
          git config user.name "mdeguzis"
          git config user.email "mdeguzis@gmail.com"
          git add latest/ backups.jsonl
          git commit -m "backup (${TRIGGER}): ${DATE} [${TAG}]"
          git push

      - name: Back-comment run summary on issue
        if: always()
        uses: ./.github/actions/back-comment-run
        with:
          issue_id: ${{ inputs.issue_id }}
          status: ${{ job.status }}
          workflow_name: backup
          dry_run: ${{ inputs.dry_run }}
