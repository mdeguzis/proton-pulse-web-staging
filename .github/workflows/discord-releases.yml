name: Discord Releases

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_RELEASES }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          jq -n \
            --arg title "New release: $TAG" \
            --arg desc "$RELEASE_NAME" \
            --arg url "$RELEASE_URL" \
            --argjson color 5763719 \
            --arg footer "$SENDER" \
            '{embeds: [{title: $title, description: $desc, url: $url, color: $color, footer: {text: $footer}}]}' \
          | curl -s -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
