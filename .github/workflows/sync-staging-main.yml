name: Sync main branch to staging repo

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'  # daily at 04:00 UTC -- catches any direct commits to staging repo

jobs:
  sync:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main to staging repo
        run: |
          git remote add staging https://x-access-token:${{ secrets.STAGING_DEPLOY_TOKEN }}@github.com/mdeguzis/proton-pulse-web-staging.git
          git push staging main:main --force
