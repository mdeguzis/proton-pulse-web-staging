name: Discord Issues

on:
  issues:
    types: [opened, closed, reopened]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ISSUES }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          case "$EVENT_ACTION" in
            opened)   COLOR=5763719 ;;
            closed)   COLOR=15548997 ;;
            reopened) COLOR=16776796 ;;
            *)        COLOR=9807270 ;;
          esac

          jq -n \
            --arg title "Issue $EVENT_ACTION: #$ISSUE_NUMBER" \
            --arg desc "$ISSUE_TITLE" \
            --arg url "$ISSUE_URL" \
            --argjson color "$COLOR" \
            --arg footer "$SENDER" \
            '{embeds: [{title: $title, description: $desc, url: $url, color: $color, footer: {text: $footer}}]}' \
          | curl -s -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
