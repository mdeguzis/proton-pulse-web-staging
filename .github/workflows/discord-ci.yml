name: Discord CI Status

on:
  workflow_run:
    # When adding a new workflow .yml to this repo, add its `name:` value here
    # so a failure surfaces in #builds. Discord-* notifier workflows are
    # intentionally excluded -- if Discord is down they would not be able to
    # report their own failure anyway.
    workflows:
      - Build Site Data
      - CI
      - Deploy Supabase Edge Functions
      - Backup
      - Content Moderation
      - Deploy on merge to main
      - Sync staging repo
      - Update Epic Catalog
      - Update GOG Catalog
    types: [completed]

permissions:
  contents: read

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_BUILDS }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          WF_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WF_URL: ${{ github.event.workflow_run.html_url }}
          SENDER: ${{ github.event.sender.login }}
        run: |
          MSG=$(printf '**Build failed: %s**\nBranch: `%s`\n%s\n_triggered by %s_' "$WF_NAME" "$WF_BRANCH" "$WF_URL" "$SENDER")
          jq -n --arg content "$MSG" '{content: $content}' \
          | curl -s -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
